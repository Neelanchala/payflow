<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics - PayFlow</title>

  <link rel="stylesheet" href="/css/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>

<body>


<div class="app-layout">

  <!-- SIDEBAR -->
 <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main-content">

    <div class="page-header">
      <h1>Analytics</h1>
      <p>Track revenue trends and performance insights.</p>
    </div>

    <p id="analytics-error" class="error-msg"></p>

    <!-- STATS -->
    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value" id="today-revenue">₹0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value" id="weekly-revenue">₹0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-value" id="monthly-revenue">₹0</div>
      </div>

    </div>

    <!-- CHART GRID -->
    <div class="analytics-grid">

      <!-- WEEKLY -->
      <div class="card">
        <div class="card-title">Last 7 Days Revenue</div>

        <div class="chart-wrapper">
          <canvas id="weekly-chart"></canvas>
        </div>
      </div>

      <!-- MONTHLY -->
      <div class="card">
        <div class="card-title">Monthly Trend</div>

        <div class="chart-wrapper">
          <canvas id="monthly-chart"></canvas>
        </div>
      </div>

    </div>

  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/authCheck.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/analytics.js"></script>
<script src="/js/theme.js"></script>
<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.toggle('open');
}

document.addEventListener('DOMContentLoaded', () => {

  // Highlight active nav
  const links = document.querySelectorAll('.sidebar-nav a');
  links.forEach(link => {
    if (link.href.includes('analytics.html')) {
      link.classList.add('active');
    }
  });

});
</script>





</body>
</html>
