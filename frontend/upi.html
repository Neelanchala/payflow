<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPI Pay - PayFlow</title>

  <link rel="stylesheet" href="/css/styles.css"/>
</head>

<body>

<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

<div class="app-layout">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main-content">

    <div class="page-header">
      <h1>UPI Payments</h1>
      <p>Configure UPI and generate QR payments.</p>
    </div>

    <p id="upi-error" class="error-msg"></p>
    <p id="upi-success" class="success-msg"></p>

    <!-- GRID -->
    <div class="upi-grid">

      <!-- UPI SETUP -->
      <div class="card">
        <div class="card-title">UPI Setup</div>

        <p id="current-upi" class="text-muted" style="margin-bottom:12px;"></p>

        <form id="save-upi-form">
          <div class="form-group">
            <label>UPI ID</label>
            <input type="text" id="upi-input" class="form-control"
                   placeholder="yourname@bank" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full">
            Save UPI ID
          </button>
        </form>
      </div>

      <!-- QR GENERATION -->
<div class="card">
  <div class="card-title">Generate QR Payment</div>

  <form id="generate-qr-form">

    <!-- ✅ ADD THIS BLOCK HERE -->
    <div class="form-group">
      <label>Select Customer</label>
      <select id="upi-customer" class="form-control">
        <option value="">No Customer (Manual)</option>
      </select>
    </div>

    <!-- EXISTING -->
    <div class="form-group">
      <label>Amount (₹)</label>
      <input type="number" id="qr-amount" class="form-control"
             step="0.01" min="1" required>
    </div>

    <button type="submit" class="btn btn-success btn-full">
      Generate QR
    </button>
  </form>

        <!-- QR DISPLAY -->
        <div id="qr-display" class="qr-box"
     style="text-align:center;color:#888;padding:10px;">
  QR will appear here
</div>

<!-- ✅ ADD THIS BUTTON RIGHT BELOW QR -->
<div style="text-align:center; margin-top:10px;">
  <button onclick="sendWhatsAppUPI()" class="btn btn-primary">
    Send via WhatsApp
  </button>
</div>

      </div>

    </div>

  </main>
</div>

<!-- SCRIPTS -->
<script src="/js/api.js"></script>
<script src="/js/authCheck.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/upi.js"></script>
<script src="/js/theme.js"></script>

<script>
// Safe sidebar toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.toggle('open');
}

// Page-specific logic ONLY
document.addEventListener('DOMContentLoaded', () => {

  // Active nav highlight
  const links = document.querySelectorAll('.sidebar-nav a');

  links.forEach(link => {
    if (link.href.includes('upi.html')) {
      link.classList.add('active');
    }
  });

});
</script>

</body>
</html>
