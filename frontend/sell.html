<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sell - PayFlow</title>

  <link rel="stylesheet" href="/css/styles.css"/>
</head>

<body>



<div class="app-layout">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main-content">

    <div class="page-header">
      <h1>Make a Sale</h1>
      <p>Select product, quantity, and record the transaction.</p>
    </div>

    <!-- GRID -->
    <div class="sell-grid">

      <!-- FORM -->
      <div class="card">
        <div class="card-title">New Sale</div>

        <form id="sell-form">

          <div class="form-group">
            <label>Product</label>
            <select id="sell-item" class="form-control" required>
              <option value="">Loading products...</option>
            </select>
          </div>

          <div class="form-row">

            <div class="form-group">
              <label>Quantity</label>
              <input type="number" id="sell-qty" class="form-control"
                     min="1" value="1" required>
            </div>

            <div class="form-group">
              <label>Payment Status</label>
              <select id="sell-status" class="form-control">
                <option value="PAID">PAID (Cash/UPI)</option>
                <option value="UNPAID">UNPAID (Credit)</option>
              </select>
            </div>

          </div>

          <div class="form-group">
            <label>Customer (Optional)</label>
            <select id="sell-customer" class="form-control">
              <option value="">Loading customers...</option>
            </select>
          </div>

          <div id="sell-total" class="sell-total-box">Total: ₹0</div>

          <p id="sell-error" class="error-msg"></p>
          <p id="sell-success" class="success-msg"></p>

          <button type="submit" class="btn btn-primary btn-full">
            Record Sale
          </button>

        </form>
      </div>

      <!-- INFO PANEL -->
      <div class="card">
        <div class="card-title">Quick Info</div>

        <ul class="sell-info">
          <li>✔ Auto calculates total</li>
          <li>✔ Supports credit (UNPAID)</li>
          <li>✔ Tracks customer history</li>
          <li>✔ Updates inventory instantly</li>
        </ul>
      </div>

    </div>

  </main>

</div>

<!-- SCRIPTS -->
<script src="/js/api.js"></script>
<script src="/js/authCheck.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/sell.js"></script>
<script src="/js/theme.js"></script>

<script>
// Safe sidebar toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.toggle('open');
}

// Page-specific logic ONLY
document.addEventListener('DOMContentLoaded', () => {

  // Active nav highlight
  const links = document.querySelectorAll('.sidebar-nav a');

  links.forEach(link => {
    if (link.href.includes('sell.html')) {
      link.classList.add('active');
    }
  });

});
</script>

</body>
</html>
