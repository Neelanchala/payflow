<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory - PayFlow</title>

  <link rel="stylesheet" href="/css/styles.css"/>
</head>

<body>



<div class="app-layout">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main-content">

    <div class="page-header">
      <h1>Inventory</h1>
      <p>Manage your products and stock levels.</p>
    </div>

    <!-- GRID -->
    <div class="inventory-grid">

      <!-- ADD PRODUCT -->
      <div class="card">
        <div class="card-title">Add Product</div>

        <form id="add-product-form">

          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="item-name" class="form-control"
                   placeholder="e.g. Rice 1kg" required>
          </div>

          <div class="form-row">

            <div class="form-group">
              <label>Price (₹)</label>
              <input type="number" id="item-price" class="form-control"
                     step="0.01" min="0" required>
            </div>

            <div class="form-group">
              <label>Quantity</label>
              <input type="number" id="item-qty" class="form-control"
                     min="0" required>
            </div>

          </div>

          <p id="inv-error" class="error-msg"></p>
          <p id="inv-success" class="success-msg"></p>

          <button type="submit" class="btn btn-primary btn-full">
            Add Product
          </button>

        </form>
      </div>

      <!-- INFO -->
      <div class="card">
        <div class="card-title">Stock Overview</div>
        <p class="text-muted">
          Items with quantity &lt; 5 are marked ⚠️ and shown in red.
        </p>
      </div>

    </div>

    <!-- TABLE -->
    <div class="card inventory-table-card">
      <div class="card-title">All Products</div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>ID</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="inv-table-body">
            <tr>
              <td colspan="5" style="text-align:center;color:#888;">
                Loading products...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

</div>

<!-- SCRIPTS -->
<script src="/js/api.js"></script>
<script src="/js/authCheck.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/inventory.js"></script>
<script src="/js/theme.js"></script>

<script>
// Safe sidebar toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.toggle('open');
}

// Page-specific logic ONLY
document.addEventListener('DOMContentLoaded', () => {

  // Active nav highlight
  const links = document.querySelectorAll('.sidebar-nav a');

  links.forEach(link => {
    if (link.href.includes('inventory.html')) {
      link.classList.add('active');
    }
  });

});
</script>

</body>
</html>
